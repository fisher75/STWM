hydra:
  run:
    dir: ../output/${exp_id}/${dataset}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(levelname)s] - %(message)s'
        datefmt: '%Y-%m-%d %H:%M:%S'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${now:%Y-%m-%d_%H-%M-%S}-eval.log
        mode: w
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: ${now:%Y-%m-%d_%H-%M-%S}-hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - dataset=generic
    - image_directory=/home/chen034/workspace/stwm/tmp/vos_smoke_generic/JPEGImages
    - mask_directory=/home/chen034/workspace/stwm/tmp/vos_smoke_generic/Annotations
    - size=480
    - save_all=true
    - use_all_masks=false
    - use_long_term=true
    - mem_every=5
    - amp=true
    - weights=/home/chen034/workspace/stwm/models/checkpoints/cutie/cutie-base-mega.pth
    - output_dir=/home/chen034/workspace/stwm/outputs/smoke_tests/cutie_vspw
    - exp_id=smoke_vspw_43
  job:
    name: eval_vos
    chdir: null
    override_dirname: amp=true,dataset=generic,exp_id=smoke_vspw_43,image_directory=/home/chen034/workspace/stwm/tmp/vos_smoke_generic/JPEGImages,mask_directory=/home/chen034/workspace/stwm/tmp/vos_smoke_generic/Annotations,mem_every=5,output_dir=/home/chen034/workspace/stwm/outputs/smoke_tests/cutie_vspw,save_all=true,size=480,use_all_masks=false,use_long_term=true,weights=/home/chen034/workspace/stwm/models/checkpoints/cutie/cutie-base-mega.pth
    id: ???
    num: ???
    config_name: eval_config.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /raid/chen034/workspace/stwm/third_party/Cutie
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /raid/chen034/workspace/stwm/third_party/Cutie/cutie/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /raid/chen034/workspace/stwm/third_party/output/smoke_vspw_43/generic
    choices:
      model: base
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: custom-no-rank.yaml
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
